name: docs-check

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Validate static docs
        run: python3 scripts/check_docs.py
